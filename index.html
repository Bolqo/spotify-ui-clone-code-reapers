<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spotify UI Clone — Home">
    <title>Spotify - Home</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
    <div class="app">
        <aside class="app__sidebar">
            <div class="sidebar__wrapper">
                <!-- Sidebar Header -->
                <div class="sidebar__header">
                    <a href="./library.html" class="sidebar__link">
                        <img src="src/assets/icons/library.svg" alt="Library icon" class="sidebar__header-icon">
                        <span class="sidebar__label">My Library</span>
                    </a>
                </div>

                <!-- Sidebar Navigation -->
                <nav class="sidebar__nav">
                    <ul class="sidebar__list">
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <img src="src/assets/icons/pins.svg" alt="Pins" class="sidebar__icon">
                                <span class="sidebar__label">Pins</span>
                            </a>
                            <img src="src/assets/icons/arrow_right.svg" alt="" class="sidebar__arrow">
                        </li>
                        <li class="sidebar__item">
                            <a href="playlist.html" class="sidebar__link">
                                <img src="src/assets/icons/playlists.svg" alt="Playlists" class="sidebar__icon">
                                <span class="sidebar__label">Playlists</span>
                            </a>
                            <img src="src/assets/icons/arrow_right.svg" alt="" class="sidebar__arrow">
                        </li>
                        <li class="sidebar__item">
                            <a href="liked-songs.html" class="sidebar__link">
                                <img src="src/assets/icons/liked_songs (heart).svg" alt="Liked songs" class="sidebar__icon">
                                <span class="sidebar__label">Liked songs</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <img src="src/assets/icons/saves.svg" alt="Saves" class="sidebar__icon">
                                <span class="sidebar__label">Saves</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="album.html" class="sidebar__link">
                                <img src="src/assets/icons/albums.svg" alt="Albums" class="sidebar__icon">
                                <span class="sidebar__label">Albums</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <img src="src/assets/icons/folder.svg" alt="Folders" class="sidebar__icon">
                                <span class="sidebar__label">Folders</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="podcast-show.html" class="sidebar__link">
                                <img src="src/assets/icons/podcasts.svg" alt="Podcasts" class="sidebar__icon">
                                <span class="sidebar__label">Podcasts</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="#" class="sidebar__link">
                                <img src="src/assets/icons/audiobook.svg" alt="Audiobooks" class="sidebar__icon">
                                <span class="sidebar__label">Audiobooks</span>
                            </a>
                        </li>
                        <li class="sidebar__item">
                            <a href="artist.html" class="sidebar__link">
                                <img src="src/assets/icons/artists.svg" alt="Artists" class="sidebar__icon">
                                <span class="sidebar__label">Artists</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>
        <nav class="app__nav">
            <nav class="app__nav">
  <div class="nav__left">
    <!-- Hidden radio inputs -->
    <input type="radio" name="nav-btn" id="home" checked>
    <input type="radio" name="nav-btn" id="discover">
    <input type="radio" name="nav-btn" id="search">

    <!-- Labels as buttons -->
    <label class="nav__btn" for="home">
      <span class="nav__icon home"></span>Home
    </label>
    <label class="nav__btn" for="discover">
      <span class="nav__icon discover"></span>Discover
    </label>
    <label class="nav__btn" for="search">
      <span class="nav__icon search"></span>Search
    </label>
  </div>

  <div class="nav__right">
  <span class="icon notification"></span>
  <span class="icon lock"></span>
  <span class="icon friends"></span>
  <span class="icon settings"></span>
  <span class="icon avatar"></span>
</div>
</nav>
                <!--This is app navigation-->
        </nav>
        <div class="app__main">
            <header class="main__header">
                <!--This is app main header-->
            </header>
            <main class="main__content">
                <!--This is app main content-->
            </main>
        </div>
        <footer class="app__player">
                <!--This is app player-->
        </footer>
    </div>
</body>
</html>
